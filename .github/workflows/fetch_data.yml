name: Fetch Daily FII/DII Data

on:
  schedule:
    # Run every weekday at 14:00 UTC (19:30 IST)
    # NSE usually updates the cash market data between 18:00 and 19:30 IST
    - cron: '0 14 * * 1-5'
  workflow_dispatch: # Allow manual triggers

jobs:
  fetch_data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push changes back to the repo
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Fetch Script
        run: python fetch_fiidii.py
          
      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/fiidii.json
          git commit -m "chore: auto-update FII/DII data [skip ci]" || exit 0
          git push origin main
