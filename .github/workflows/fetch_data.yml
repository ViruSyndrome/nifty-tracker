name: Fetch Daily FII/DII Data

on:
  schedule:
    # Run every weekday at 14:30 UTC (20:00 IST) to ensure NSE data is published
    - cron: '30 14 * * 1-5'
  workflow_dispatch: # Allow manual triggers

jobs:
  fetch_data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Fetch Script
        run: python fetch_fiidii.py
          
      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/fiidii.json
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update FII/DII data for $(date +'%Y-%m-%d') [skip ci]" && git push origin main)
